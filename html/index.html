<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MRAP Multipart Upload</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Uppy CSS -->
  <link href="https://releases.transloadit.com/uppy/v3.25.0/uppy.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      width: 850px;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
      color: #333;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Global File Upload (MRAP + Multipart)</h2>

  <div id="uppy"></div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="pauseUpload()">Pause</button>
    <button class="btn btn-secondary" onclick="resumeUpload()">Resume</button>
    <button class="btn btn-primary" onclick="retryUpload()">Retry Failed</button>
  </div>

  <div class="footer-note">
    Upload is routed automatically to nearest healthy region.
  </div>
</div>

<script src="https://releases.transloadit.com/uppy/v3.25.0/uppy.min.js"></script>

<script>
  const API_BASE =
    "https://xxxx.execute-api.ap-south-1.amazonaws.com/prod";

  const uppy = new Uppy.Uppy({
    debug: true,
    autoProceed: false
  });

  uppy.use(Uppy.Dashboard, {
    inline: true,
    target: '#uppy',
    proudlyDisplayPoweredByUppy: false,
    height: 400,
    showProgressDetails: true
  });

  uppy.use(Uppy.AwsS3Multipart, {

    createMultipartUpload: async (file) => {
      const res = await fetch(`${API_BASE}/create`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fileName: file.name,
          contentType: file.type
        })
      });

      return await res.json();
    },

    signPart: async (file, { uploadId, key, partNumber }) => {
      const res = await fetch(`${API_BASE}/part`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          uploadId,
          key,
          partNumber
        })
      });

      const data = await res.json();
      return { url: data.signedUrl };
    },

    listParts: async (file, { uploadId, key }) => {
      const res = await fetch(`${API_BASE}/list-parts`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uploadId, key })
      });

      const data = await res.json();
      return data.parts;
    },

    completeMultipartUpload: async (file, { uploadId, key, parts }) => {
      await fetch(`${API_BASE}/complete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          uploadId,
          key,
          parts
        })
      });

      return { location: key };
    },

    abortMultipartUpload: async (file, { uploadId, key }) => {
      await fetch(`${API_BASE}/abort`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uploadId, key })
      });
    },

    limit: 5
  });

  function pauseUpload() {
    uppy.pauseAll();
  }

  function resumeUpload() {
    uppy.resumeAll();
  }

  function retryUpload() {
    uppy.retryAll();
  }

  uppy.on("complete", (result) => {
    console.log("Upload complete:", result);
  });

</script>

</body>
</html>
